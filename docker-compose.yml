version: "3.8"

services:
  database:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: tingeso
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    depends_on:
      database:
        condition: service_healthy
    environment:
      DB_HOST: database
      SPRING_DATASOURCE_URL: jdbc:postgresql://database:5432/tingeso
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
    extra_hosts: -"localhost:host-gateway"

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: balanceador-de-carga
    ports:
      - "8021:80"
    depends_on:
      - backend

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://database:5432/tingeso
      KC_DB_USERNAME: ${DB_USER}
      KC_DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "9090:8080"
    depends_on:
      database:
        condition: service_healthy

volumes:
  postgres_data:
